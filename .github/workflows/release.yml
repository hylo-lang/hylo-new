name: Publish release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-draft-release:
    name: Prepare draft release
    runs-on: ubuntu-24.04
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$TAG" --repo "$REPOSITORY" --draft --generate-notes --latest=false --title "$TAG"
        shell: bash

  build-distributable:
    name: Build distributable for ${{ matrix.target }}
    needs: prepare-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-15
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x64
          - os: windows-2025
            target: windows-x64
          - os: windows-11-arm
            target: windows-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2.4"

      - name: Set up LLVM
        uses: hylo-lang/get-llvm@v0.3.0
        id: get-llvm
        with:
          llvmVersion: "20.1.6"
          llvmBuildRelease: "20260309-221030"
          llvmBuildConfig: MinSizeRel
          addToPkgConfigPath: true
          addToPath: true

      - name: Download Recent Visual Studio and Windows SDK
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-vsdevenv@main
        with:
          winsdk: "10.0.26100.0"
          # Note: The GitHub windows-2025 runner has only a very old version of the Windows SDK available by default.
          #       Swift is said to require version 10.0.22621.0: https://forums.swift.org/t/swiftpm-plugin-doesnt-work-with-the-latest-visual-studio-version/78183/14
          #       That no longer works, so we had to upgrade to 10.0.26100.0.
          #       See also: https://github.com/swiftlang/swift/issues/88237

      - name: Build distributable
        run: swift build -c release --verbose --product hc --static-swift-stdlib -Xswiftc -DUSE_BUNDLED_STANDARD_LIBRARY
        shell: pwsh

      - name: Stage distributable
        id: stage
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          WINDOWS_ARCH: ${{ matrix.windows_arch }}
        run: |
          $ErrorActionPreference = 'Stop'
          $binPath = (swift build -c release --product hc --static-swift-stdlib -Xswiftc -DUSE_BUNDLED_STANDARD_LIBRARY --show-bin-path).Trim()
          $binaryName = if ($env:RUNNER_OS -eq 'Windows') { 'hc.exe' } else { 'hc' }
          $binaryPath = Join-Path $binPath $binaryName
          $assetBaseName = "hylo-$env:TAG-$env:TARGET"
          $stageDir = Join-Path $env:RUNNER_TEMP "stage-$env:TARGET"
          $archivePath = Join-Path $env:RUNNER_TEMP "$assetBaseName.tar.zst"

          if (Test-Path $stageDir) { Remove-Item -Recurse -Force $stageDir }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          # Copy the primary binary.
          Copy-Item -Force $binaryPath $stageDir

          # On Windows, bundle the non-system runtime DLLs that aren't part of a
          # fresh Windows 11 install. We deliberately omit:
          #   - Core Windows DLLs: KERNEL32, ntdll, ole32, SHELL32, ADVAPI32
          #   - Universal CRT shims (api-ms-win-crt-*), which ship with Windows 10+
          # We do bundle:
          #   - The Swift runtime DLLs the executable links against
          #   - The MSVC runtime DLLs (MSVCP140, VCRUNTIME140, VCRUNTIME140_1)
          #     since the VC++ Redistributable is not guaranteed on a fresh Windows 11.
          if ($env:RUNNER_OS -eq 'Windows') {
            # Ask the Windows loader where each DLL would be resolved from,
            # using the same search order the OS uses at run time. This avoids
            # any assumption about toolchain layout or PATH placement.
            $loaderCs = @(
              '[System.Runtime.InteropServices.DllImport("kernel32.dll", CharSet=System.Runtime.InteropServices.CharSet.Unicode, SetLastError=true)]',
              'public static extern System.IntPtr LoadLibraryExW(string lpLibFileName, System.IntPtr hFile, uint dwFlags);',
              '[System.Runtime.InteropServices.DllImport("kernel32.dll", CharSet=System.Runtime.InteropServices.CharSet.Unicode, SetLastError=true)]',
              'public static extern uint GetModuleFileNameW(System.IntPtr hModule, System.Text.StringBuilder lpFilename, uint nSize);',
              '[System.Runtime.InteropServices.DllImport("kernel32.dll", SetLastError=true)]',
              'public static extern bool FreeLibrary(System.IntPtr hModule);'
            ) -join "`n"
            Add-Type -Namespace Win32 -Name Loader -MemberDefinition $loaderCs

            function Resolve-DllPath([string]$name) {
              $LOAD_LIBRARY_AS_DATAFILE = 0x2
              $h = [Win32.Loader]::LoadLibraryExW($name, [System.IntPtr]::Zero, $LOAD_LIBRARY_AS_DATAFILE)
              if ($h -eq [System.IntPtr]::Zero) {
                $err = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
                throw "LoadLibraryExW failed for '$name' (Win32 error $err)"
              }
              try {
                $sb = New-Object System.Text.StringBuilder 32768
                $n = [Win32.Loader]::GetModuleFileNameW($h, $sb, [uint32]$sb.Capacity)
                if ($n -eq 0) {
                  $err = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
                  throw "GetModuleFileNameW failed for '$name' (Win32 error $err)"
                }
                return $sb.ToString()
              } finally {
                [void][Win32.Loader]::FreeLibrary($h)
              }
            }

            # DLLs the executable depends on that are NOT guaranteed to be
            # present on a fresh Windows 11 install. Core Windows DLLs
            # (KERNEL32, ntdll, ole32, SHELL32, ADVAPI32) are intentionally
            # excluded because they are Known DLLs and would always load from
            # System32; Universal CRT shims (api-ms-win-crt-*) are excluded
            # because they ship with Windows 10+.
            $bundledDlls = @(
              'swiftCore.dll',
              'swift_Concurrency.dll',
              'swiftCRT.dll',
              'swiftWinSDK.dll',
              'Foundation.dll',
              'FoundationEssentials.dll',
              'FoundationInternationalization.dll',
              'MSVCP140.dll',
              'VCRUNTIME140.dll',
              'VCRUNTIME140_1.dll'
            )

            foreach ($dll in $bundledDlls) {
              $src = Resolve-DllPath $dll
              Write-Host "Bundling $dll <- $src"
              Copy-Item -Force -LiteralPath $src -Destination (Join-Path $stageDir $dll)
            }
          }

          "stage_dir=$stageDir"     >> $env:GITHUB_OUTPUT
          "archive_path=$archivePath" >> $env:GITHUB_OUTPUT
          "asset_base_name=$assetBaseName" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Archive distributable
        run: |
          $ErrorActionPreference = 'Stop'
          $archivePath = "${{ steps.stage.outputs.archive_path }}"
          $stageDir    = "${{ steps.stage.outputs.stage_dir }}"
          if (Test-Path $archivePath) { Remove-Item -Force $archivePath }
          tar --zstd -cf $archivePath -C $stageDir .
        shell: pwsh

      - name: Upload distributable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.asset_base_name }}
          path: ${{ steps.stage.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 7

  verify-and-publish-distributable:
    name: Verify and publish distributable for ${{ matrix.target }}
    needs: build-distributable
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-15
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x64
          - os: windows-2025
            target: windows-x64
          - os: windows-11-arm
            target: windows-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Download distributable artifact
        uses: actions/download-artifact@v4
        with:
          name: hylo-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ runner.temp }}/dist

      - name: Verify no Swift toolchain leaks into verification (POSIX)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          # Sanitize PATH to a minimal set so that any pre-installed Swift on the
          # runner cannot satisfy the binary's dynamic dependencies.
          MINIMAL_PATH="/usr/bin:/bin:/usr/sbin:/sbin"
          export PATH="$MINIMAL_PATH"
          if command -v swift >/dev/null 2>&1; then
            echo "ERROR: 'swift' is still on PATH after sanitization: $(command -v swift)"
            exit 1
          fi
          ARCHIVE="${{ runner.temp }}/dist/hylo-${{ github.ref_name }}-${{ matrix.target }}.tar.zst"
          EXTRACT_DIR="${{ runner.temp }}/extracted"
          mkdir -p "$EXTRACT_DIR"
          tar --zstd -xf "$ARCHIVE" -C "$EXTRACT_DIR"
          ls -la "$EXTRACT_DIR"
          PATH="$MINIMAL_PATH" "$EXTRACT_DIR/hc" --help > /dev/null
        shell: bash

      - name: Verify no Swift toolchain leaks into verification (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = 'Stop'
          # Sanitize PATH to system directories only; this prevents any
          # pre-installed Swift toolchain on the runner from satisfying the
          # executable's dynamic dependencies. Bundled DLLs sit next to hc.exe
          # and Windows' DLL search order finds them via the executable's
          # directory before consulting PATH.
          $minimalPath = "$env:SystemRoot\System32;$env:SystemRoot;$env:SystemRoot\System32\Wbem;$env:SystemRoot\System32\WindowsPowerShell\v1.0"
          $env:PATH = $minimalPath

          $swift = Get-Command swift -ErrorAction SilentlyContinue
          if ($swift) {
            Write-Error "'swift' is still on PATH after sanitization: $($swift.Source)"
            exit 1
          }

          $archive = "${{ runner.temp }}/dist/hylo-${{ github.ref_name }}-${{ matrix.target }}.tar.zst"
          $extractDir = "${{ runner.temp }}/extracted"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar --zstd -xf $archive -C $extractDir
          Get-ChildItem $extractDir | Format-Table -AutoSize

          & "$extractDir\hc.exe" --help | Out-Null
        shell: pwsh

      - name: Upload distributable to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/dist/hylo-$TAG-$TARGET.tar.zst"
          gh release upload "$TAG" "$archive" --repo "$REPOSITORY" --clobber
        shell: bash
