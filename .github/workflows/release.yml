name: Publish release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-draft-release:
    name: Prepare draft release
    runs-on: ubuntu-24.04
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$TAG" --repo "$REPOSITORY" --draft --generate-notes --latest=false --title "$TAG"
        shell: bash

  build-distributable:
    name: Build distributable for ${{ matrix.target }}
    needs: prepare-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            triple: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: linux-arm64
            triple: aarch64-unknown-linux-gnu
          - os: macos-15
            target: macos-arm64
            triple: arm64-apple-macosx
          - os: macos-15-intel
            target: macos-x64
            triple: x86_64-apple-macosx
          - os: windows-2025
            target: windows-x64
            triple: x86_64-unknown-windows-msvc
            build_arch: amd64
          - os: windows-11-arm
            target: windows-arm64
            triple: aarch64-unknown-windows-msvc
            build_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Single, uniform Swift setup across all platforms. We use a
      # development snapshot rather than 6.3.1-RELEASE because static-stdlib
      # on Windows requires the WindowsExperimental.sdk static archives,
      # which are populated only in dev snapshots, and because earlier
      # snapshots crash in DebugInfoVerifier (MoveOnlyChecker on
      # SwiftyLLVM.MemoryBuffer.deinit). Keeping every platform on the same
      # toolchain avoids surprise behavioral differences between OSes.
      - name: Set up Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: development
          swift-build: DEVELOPMENT-SNAPSHOT-2026-04-30-a
          build_arch: ${{ matrix.build_arch }}
          update-sdk-modules: ${{ runner.os == 'Windows' }}

      - name: Set up LLVM
        uses: hylo-lang/get-llvm@v0.3.0
        id: get-llvm
        with:
          llvmVersion: "20.1.6"
          llvmBuildRelease: "20260309-221030"
          llvmBuildConfig: MinSizeRel
          addToPkgConfigPath: true
          addToPath: true

      - name: Compute Swift build arguments
        id: swift-args
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Common arguments used by both `swift build` and `swift build --show-bin-path`.
          # On Windows we add the experimental SDK so that -static-stdlib actually
          # links the Swift runtime statically; elsewhere --static-swift-stdlib is
          # sufficient.
          $buildArgs = @('-c', 'release', '--product', 'hc', '-Xswiftc', '-DUSE_BUNDLED_STANDARD_LIBRARY')
          if ($env:RUNNER_OS -eq 'Windows') {
            # An explicit --triple is required for SwiftPM to locate the
            # per-arch static runtime libraries inside the experimental SDK
            # (otherwise lld-link can't find swiftCore.lib etc.).
            $ExperimentalSDK = "$(Split-Path -Path ${env:SDKROOT} -Parent)/WindowsExperimental.sdk"
            $buildArgs += @(
              '--triple', '${{ matrix.triple }}',
              '-debug-info-format', 'none',
              '-Xswiftc', '-sdk', '-Xswiftc', $ExperimentalSDK,
              '-Xswiftc', '-static-stdlib'
            )
          } else {
            $buildArgs += @('--static-swift-stdlib')
          }
          "build_args=$($buildArgs -join ' ')" >> $env:GITHUB_OUTPUT

      - name: Build distributable
        shell: pwsh
        run: swift build --verbose ${{ steps.swift-args.outputs.build_args }}

      - name: Stage distributable
        id: stage
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $binPath = (swift build ${{ steps.swift-args.outputs.build_args }} --show-bin-path).Trim()
          $binaryName = if ($env:RUNNER_OS -eq 'Windows') { 'hc.exe' } else { 'hc' }

          $binaryPath    = Join-Path $binPath $binaryName
          $assetBaseName = "hylo-$env:TAG-$env:TARGET"
          $stageDir      = Join-Path $env:RUNNER_TEMP "stage-$env:TARGET"
          $archivePath   = Join-Path $env:RUNNER_TEMP "$assetBaseName.tar.zst"

          if (Test-Path $stageDir) { Remove-Item -Recurse -Force $stageDir }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item -Force $binaryPath $stageDir

          "stage_dir=$stageDir"            >> $env:GITHUB_OUTPUT
          "archive_path=$archivePath"      >> $env:GITHUB_OUTPUT
          "asset_base_name=$assetBaseName" >> $env:GITHUB_OUTPUT

      - name: Archive distributable
        run: |
          $ErrorActionPreference = 'Stop'
          $archivePath = "${{ steps.stage.outputs.archive_path }}"
          $stageDir    = "${{ steps.stage.outputs.stage_dir }}"
          if (Test-Path $archivePath) { Remove-Item -Force $archivePath }
          tar --zstd -cf $archivePath -C $stageDir .
        shell: pwsh

      - name: Upload distributable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.asset_base_name }}
          path: ${{ steps.stage.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 7

  verify-and-publish-distributable:
    name: Verify and publish distributable for ${{ matrix.target }}
    needs: build-distributable
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-15
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x64
          - os: windows-2025
            target: windows-x64
          - os: windows-11-arm
            target: windows-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Download distributable artifact
        uses: actions/download-artifact@v4
        with:
          name: hylo-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ runner.temp }}/dist

      - name: Verify distributable on a Swift-free environment (POSIX)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          ARCHIVE="${{ runner.temp }}/dist/hylo-${{ github.ref_name }}-${{ matrix.target }}.tar.zst"
          EXTRACT_DIR="${{ runner.temp }}/extracted"
          mkdir -p "$EXTRACT_DIR"
          tar --zstd -xf "$ARCHIVE" -C "$EXTRACT_DIR"
          ls -la "$EXTRACT_DIR"

          # Verify the binary doesn't depend on a *user-installed* Swift
          # runtime. On macOS the Swift runtime ships with the OS at
          # /usr/lib/swift/ since Catalina (10.15), so dependencies there
          # are guaranteed by the system and are allowed; only Swift libs
          # under developer-only paths (CommandLineTools, Xcode) would
          # indicate a non-portable artifact. On Linux any libswift*
          # dependency is a regression because nothing ships Swift by
          # default.
          if [ "$(uname -s)" = "Darwin" ]; then
            deps=$(otool -L "$EXTRACT_DIR/hc")
            echo "$deps"
            offenders=$(echo "$deps" | grep -E 'libswift|swiftCore|swift_Concurrency|swiftFoundation' \
              | grep -vE '^\s+/usr/lib/swift/' || true)
          else
            deps=$(ldd "$EXTRACT_DIR/hc" || true)
            echo "$deps"
            offenders=$(echo "$deps" | grep -Ei 'libswift|swiftCore|swift_Concurrency|swiftFoundation' || true)
          fi
          if [ -n "$offenders" ]; then
            echo "ERROR: distributable depends on non-OS Swift runtime libraries:"
            echo "$offenders"
            exit 1
          fi

          # Sanity-run the binary with a sanitized PATH so any environment
          # leakage of Swift tooling can't paper over a broken artifact.
          PATH="/usr/bin:/bin:/usr/sbin:/sbin" "$EXTRACT_DIR/hc" --help > /dev/null
        shell: bash

      - name: Verify distributable on a Swift-free environment (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = 'Stop'
          # Sanitize PATH to system directories only. With a fully static
          # build there should be no Swift DLL dependencies to satisfy, so
          # this is mainly a guard against regressions.
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot;$env:SystemRoot\System32\Wbem;$env:SystemRoot\System32\WindowsPowerShell\v1.0"
          $swift = Get-Command swift -ErrorAction SilentlyContinue
          if ($swift) {
            Write-Error "'swift' is still on PATH after sanitization: $($swift.Source)"
            exit 1
          }

          $archive = "${{ runner.temp }}/dist/hylo-${{ github.ref_name }}-${{ matrix.target }}.tar.zst"
          $extractDir = "${{ runner.temp }}/extracted"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar --zstd -xf $archive -C $extractDir
          Get-ChildItem $extractDir | Format-Table -AutoSize

          & "$extractDir\hc.exe" --help | Out-Null
        shell: pwsh

      - name: Upload distributable to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/dist/hylo-$TAG-$TARGET.tar.zst"
          gh release upload "$TAG" "$archive" --repo "$REPOSITORY" --clobber
        shell: bash
