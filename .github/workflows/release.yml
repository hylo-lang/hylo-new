name: Publish release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-draft-release:
    name: Prepare draft release
    runs-on: ubuntu-24.04
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$TAG" --repo "$REPOSITORY" --draft --generate-notes --latest=false --title "$TAG"
        shell: bash

  build-distributable:
    name: Build distributable for ${{ matrix.target }}
    needs: prepare-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-15
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x64
          # Both Windows targets cross-compile from the x64 runner using the
          # experimental SDK that ships in recent Swift toolchains; this lets
          # us statically link the Swift runtime and produce a self-contained
          # hc.exe with no DLL dependencies outside the Windows base system.
          - os: windows-2025
            target: windows-x64
            swift_triple: x86_64-unknown-windows-msvc
          - os: windows-2025
            target: windows-arm64
            swift_triple: aarch64-unknown-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Swift (POSIX)
        if: runner.os != 'Windows'
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"

      - name: Set up Swift (Windows, with experimental SDK)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3.1-release
          swift-build: 6.3.1-RELEASE
          update-sdk-modules: true

      - name: Set up LLVM
        uses: hylo-lang/get-llvm@v0.3.0
        id: get-llvm
        with:
          llvmVersion: "20.1.6"
          llvmBuildRelease: "20260309-221030"
          llvmBuildConfig: MinSizeRel
          addToPkgConfigPath: true
          addToPath: true

      - name: Build distributable (POSIX)
        if: runner.os != 'Windows'
        run: swift build -c release --verbose --product hc --static-swift-stdlib -Xswiftc -DUSE_BUNDLED_STANDARD_LIBRARY
        shell: bash

      - name: Build distributable (Windows, statically linked)
        if: runner.os == 'Windows'
        env:
          SWIFT_TRIPLE: ${{ matrix.swift_triple }}
        run: |
          $ErrorActionPreference = 'Stop'
          $ExperimentalSDK = "$(Split-Path -Path ${env:SDKROOT} -Parent)/WindowsExperimental.sdk"
          swift build `
            --triple $env:SWIFT_TRIPLE `
            -c release `
            -debug-info-format none `
            --product hc `
            -Xswiftc -sdk -Xswiftc $ExperimentalSDK `
            -Xswiftc -static-stdlib `
            -Xswiftc -DUSE_BUNDLED_STANDARD_LIBRARY
        shell: pwsh

      - name: Stage distributable
        id: stage
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          SWIFT_TRIPLE: ${{ matrix.swift_triple }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:RUNNER_OS -eq 'Windows') {
            $ExperimentalSDK = "$(Split-Path -Path ${env:SDKROOT} -Parent)/WindowsExperimental.sdk"
            $binPath = (swift build `
              --triple $env:SWIFT_TRIPLE `
              -c release `
              --product hc `
              -Xswiftc -sdk -Xswiftc $ExperimentalSDK `
              -Xswiftc -static-stdlib `
              -Xswiftc -DUSE_BUNDLED_STANDARD_LIBRARY `
              --show-bin-path).Trim()
            $binaryName = 'hc.exe'
          } else {
            $binPath = (swift build -c release --product hc --static-swift-stdlib -Xswiftc -DUSE_BUNDLED_STANDARD_LIBRARY --show-bin-path).Trim()
            $binaryName = 'hc'
          }

          $binaryPath    = Join-Path $binPath $binaryName
          $assetBaseName = "hylo-$env:TAG-$env:TARGET"
          $stageDir      = Join-Path $env:RUNNER_TEMP "stage-$env:TARGET"
          $archivePath   = Join-Path $env:RUNNER_TEMP "$assetBaseName.tar.zst"

          if (Test-Path $stageDir) { Remove-Item -Recurse -Force $stageDir }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item -Force $binaryPath $stageDir

          "stage_dir=$stageDir"            >> $env:GITHUB_OUTPUT
          "archive_path=$archivePath"      >> $env:GITHUB_OUTPUT
          "asset_base_name=$assetBaseName" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Archive distributable
        run: |
          $ErrorActionPreference = 'Stop'
          $archivePath = "${{ steps.stage.outputs.archive_path }}"
          $stageDir    = "${{ steps.stage.outputs.stage_dir }}"
          if (Test-Path $archivePath) { Remove-Item -Force $archivePath }
          tar --zstd -cf $archivePath -C $stageDir .
        shell: pwsh

      - name: Upload distributable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.asset_base_name }}
          path: ${{ steps.stage.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 7

  verify-and-publish-distributable:
    name: Verify and publish distributable for ${{ matrix.target }}
    needs: build-distributable
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-15
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x64
          # Verify on actual target hardware; the arm64 Windows archive is
          # produced via cross-compilation, so running it on windows-11-arm
          # confirms the binary genuinely works on that architecture.
          - os: windows-2025
            target: windows-x64
          - os: windows-11-arm
            target: windows-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Download distributable artifact
        uses: actions/download-artifact@v4
        with:
          name: hylo-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ runner.temp }}/dist

      - name: Verify distributable on a Swift-free environment (POSIX)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          # Sanitize PATH so any pre-installed Swift on the runner cannot
          # satisfy dynamic dependencies of the extracted binary.
          MINIMAL_PATH="/usr/bin:/bin:/usr/sbin:/sbin"
          export PATH="$MINIMAL_PATH"
          if command -v swift >/dev/null 2>&1; then
            echo "ERROR: 'swift' is still on PATH after sanitization: $(command -v swift)"
            exit 1
          fi
          ARCHIVE="${{ runner.temp }}/dist/hylo-${{ github.ref_name }}-${{ matrix.target }}.tar.zst"
          EXTRACT_DIR="${{ runner.temp }}/extracted"
          mkdir -p "$EXTRACT_DIR"
          tar --zstd -xf "$ARCHIVE" -C "$EXTRACT_DIR"
          ls -la "$EXTRACT_DIR"
          PATH="$MINIMAL_PATH" "$EXTRACT_DIR/hc" --help > /dev/null
        shell: bash

      - name: Verify distributable on a Swift-free environment (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = 'Stop'
          # Sanitize PATH to system directories only. With a fully static
          # build there should be no Swift DLL dependencies to satisfy, so
          # this is mainly a guard against regressions.
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot;$env:SystemRoot\System32\Wbem;$env:SystemRoot\System32\WindowsPowerShell\v1.0"
          $swift = Get-Command swift -ErrorAction SilentlyContinue
          if ($swift) {
            Write-Error "'swift' is still on PATH after sanitization: $($swift.Source)"
            exit 1
          }

          $archive = "${{ runner.temp }}/dist/hylo-${{ github.ref_name }}-${{ matrix.target }}.tar.zst"
          $extractDir = "${{ runner.temp }}/extracted"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar --zstd -xf $archive -C $extractDir
          Get-ChildItem $extractDir | Format-Table -AutoSize

          & "$extractDir\hc.exe" --help | Out-Null
        shell: pwsh

      - name: Upload distributable to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/dist/hylo-$TAG-$TARGET.tar.zst"
          gh release upload "$TAG" "$archive" --repo "$REPOSITORY" --clobber
        shell: bash
