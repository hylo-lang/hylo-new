name: Build and Test
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"

defaults:
  run:
    shell: pwsh

jobs:
  test:
    name: ${{ matrix.testbed }} / ${{ matrix.config }}
    strategy:
      fail-fast: false
      matrix:
        # All {os} x {config} combinations run independently. Every row is
        # benchmarked; debug is x64-only so arm OSes are excluded below.
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-2025, windows-11-arm]
        config: [debug, release]
        exclude:
          - { os: ubuntu-24.04-arm, config: debug }
          - { os: macos-15,         config: debug }
          - { os: windows-11-arm,   config: debug }
        include:
          # Map each os to a Bencher testbed label.
          - { os: ubuntu-24.04,     testbed: linux-x64 }
          - { os: ubuntu-24.04-arm, testbed: linux-arm64 }
          - { os: macos-15,         testbed: macos-arm64 }
          - { os: macos-15-intel,   testbed: macos-x64 }
          - { os: windows-2025,     testbed: windows-x64 }
          - { os: windows-11-arm,   testbed: windows-arm64 }
          # Enable code coverage export in a single configuration.
          - { os: ubuntu-24.04, config: debug, export-coverage: true }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-hylo-toolchain

      - name: Build tests
        run: swift build --build-tests -c ${{ matrix.config }} -Xswiftc -enable-testing --verbose ${{ matrix.export-coverage && '--enable-code-coverage' || '' }}

      # Report XCTest's self-measured "All tests" runtime rather than wall
      # clock, to exclude SwiftPM/test-runner startup overhead. XCTest prints
      # a summary line like:
      #   Executed 123 tests, with 0 failures (0 unexpected) in 1.114 (1.114) seconds
      # The last such match in the log is the aggregate "All tests" time.
      - name: Run and time test suite
        run: |
          swift test -c ${{ matrix.config }} --skip-build --verbose ${{ matrix.export-coverage && '--enable-code-coverage' || '' }} 2>&1 | Tee-Object -FilePath test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $log = Get-Content test.log -Raw
          $timingMatches = [regex]::Matches($log, 'in (\d+(?:\.\d+)?) \(\d+(?:\.\d+)?\) seconds')
          if ($timingMatches.Count -eq 0) {
            Write-Error 'Could not find XCTest timing summary in test output.'
            exit 1
          }
          $seconds = [double]$timingMatches[$timingMatches.Count - 1].Groups[1].Value
          @{ 'hylo-test-suite' = @{ latency = @{ value = $seconds } } } | ConvertTo-Json -Depth 5 -Compress | Tee-Object -FilePath benchmark_results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.testbed }}-${{ matrix.config }}
          path: benchmark_results.json

      # ---------- Code coverage (debug ubuntu only) ----------
      - name: Export code coverage
        if: ${{ matrix.export-coverage }}
        run: |
          $binPath = (swift build --show-bin-path).Trim()
          llvm-cov export "$binPath/HyloPackageTests.xctest" --format=lcov --instr-profile "$binPath/codecov/default.profdata" > info.lcov

      - name: Upload coverage report to Codecov
        if: ${{ matrix.export-coverage }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Independent job so the event artifact is produced regardless of which
  # test matrix rows succeed or fail. bench-upload.yml reads it to reconstruct
  # PR metadata in a fork-safe way.
  upload-triggering-event:
    name: Upload triggering event
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: triggering-event
          path: ${{ github.event_path }}
